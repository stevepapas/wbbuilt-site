name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build for wbbuilt.kremedia.com
        env:
          ASTRO_BASE: /
          ASTRO_SITE: https://wbbuilt.kremedia.com
        run: npm run build

      - name: Push dist to deploy branch
        run: |
          cd dist
          git init
          git config user.email "deploy@wbbuilt.com.au"
          git config user.name "Deploy Bot"
          git add .
          git commit -m "Deploy build $(date +'%Y-%m-%d %H:%M:%S')"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/stevepapas/wbbuilt-site.git HEAD:deploy
